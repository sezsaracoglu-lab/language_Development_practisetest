<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUR Psychology — Language Development Mock Exam</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#0f0e0c;color:#e8e0d0;font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:60px}
a{color:#c9a96e}

/* ── HEADER ── */
#hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:#0f0e0c;border-bottom:1px solid #252018}
#pbar-wrap{height:3px;background:#1e1c16}
#pbar{height:100%;background:linear-gradient(90deg,#c9a96e,#e8c47a);width:0%;transition:width .4s ease;border-radius:0 2px 2px 0}
#hdr-inner{display:flex;justify-content:space-between;align-items:center;padding:9px 24px}
#hdr-title{font-family:'Playfair Display',serif;font-size:13px;color:#c9a96e;letter-spacing:.06em;font-style:italic}
#hdr-stats{display:flex;gap:18px;font-size:13px;font-weight:500}
#cnt-correct{color:#5fa876}
#cnt-wrong{color:#c06060}
#cnt-q{color:#6a6050}

/* ── DOT TRAIL ── */
#dots{position:fixed;top:42px;left:0;right:0;z-index:150;background:#0f0e0c;border-bottom:1px solid #1e1c16;padding:8px 24px;display:flex;flex-wrap:wrap;gap:5px}
.dot{width:9px;height:9px;border-radius:50%;background:#252018;cursor:pointer;transition:background .25s,transform .15s;flex-shrink:0}
.dot:hover{transform:scale(1.3)}
.dot.active{background:#c9a96e;box-shadow:0 0 8px rgba(201,169,110,.6)}
.dot.ok{background:#5fa876}
.dot.bad{background:#c06060}

/* ── MAIN ── */
#main{max-width:760px;margin:0 auto;padding:118px 20px 20px}

/* ── QUESTION CARD ── */
.qcard{background:#1d1b17;border:1px solid #2a2720;border-radius:12px;padding:28px 30px;margin-bottom:14px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.qcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.q-num{font-family:'Playfair Display',serif;font-size:12px;color:#5a5040;letter-spacing:.08em;text-transform:uppercase}
.cat-pill{font-size:10px;font-weight:600;padding:3px 11px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase}
.pill-theory{background:#12203a;color:#5a9ed4;border:1px solid #1e3558}
.pill-methods{background:#122a1a;color:#5aab7a;border:1px solid #1e4428}
.pill-application{background:#221430;color:#9f6ed4;border:1px solid #3a2050}
.pill-comparison{background:#2a1810;color:#d48a5a;border:1px solid #4a2a18}
.pill-trap{background:#281414;color:#d46060;border:1px solid #462020}

.qtext{font-family:'Playfair Display',serif;font-size:16.5px;line-height:1.7;color:#ede5d5;margin-bottom:22px}
.qtext em{font-style:italic;color:#c9a96e}

/* ── OPTIONS ── */
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:#141210;border:1px solid #2a2720;border-radius:8px;padding:13px 17px;display:flex;gap:13px;align-items:flex-start;cursor:pointer;color:#c8c0b0;font-size:14.5px;line-height:1.55;transition:border-color .18s,background .18s;text-align:left;width:100%;font-family:'DM Sans',sans-serif}
.opt:hover:not(:disabled){border-color:#c9a96e;background:#1a1710}
.opt:disabled{cursor:default}
.opt-lbl{font-family:'Playfair Display',serif;font-weight:700;font-size:13px;color:#c9a96e;min-width:18px;margin-top:1px;flex-shrink:0}
.opt em{font-style:italic;color:#b8a898}

.opt.state-correct{background:#0f2018;border-color:#5fa876;color:#90daa8}
.opt.state-correct .opt-lbl{color:#5fa876}
.opt.state-wrong{background:#200f0f;border-color:#c06060;color:#e09090}
.opt.state-wrong .opt-lbl{color:#c06060}
.opt.state-gold{background:#211808;border-color:#c9a96e;color:#e8c87a}
.opt.state-gold .opt-lbl{color:#c9a96e}

/* ── EXPLANATION ── */
.expanel{overflow:hidden;max-height:0;transition:max-height .45s ease;margin-top:12px}
.expanel.open{max-height:900px}
.expinner{background:#13120e;border:1px solid #2a2720;border-radius:10px;padding:20px 22px}
.verdict{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding-bottom:12px;margin-bottom:14px;border-bottom:1px solid #252018}
.verdict.vc{color:#5fa876}
.verdict.vw{color:#c06060}
.exsec{margin-bottom:13px}
.exlbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#5a5040;margin-bottom:5px}
.extxt{font-size:13.5px;line-height:1.65;color:#b0a898}
.extxt em{color:#c9a96e;font-style:italic}
.extxt strong{color:#d0c8b8;font-weight:600}
.src-txt{font-size:12.5px;color:#c9a96e;font-style:italic}
.tip-box{background:#1d1b17;border-left:3px solid #c9a96e;padding:9px 14px;border-radius:0 6px 6px 0;font-size:13px;line-height:1.6;color:#a89880}

/* ── NEXT BUTTON ── */
#next-btn{display:none;width:100%;background:#c9a96e;color:#0f0e0c;border:none;border-radius:8px;padding:14px;font-family:'DM Sans',sans-serif;font-size:14.5px;font-weight:600;cursor:pointer;margin-top:13px;transition:background .2s;letter-spacing:.03em}
#next-btn:hover{background:#d4b87a}

/* ── RESULTS ── */
#results{background:#1d1b17;border:1px solid #2a2720;border-radius:12px;padding:38px;display:none;animation:fadeIn .4s ease}
.res-hd{font-family:'Playfair Display',serif;font-size:26px;color:#c9a96e;text-align:center;margin-bottom:6px}
.res-sub{text-align:center;font-size:13px;color:#6a6050;margin-bottom:30px;letter-spacing:.02em}
.score-ring{width:138px;height:138px;border-radius:50%;border:4px solid #c9a96e;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 28px;background:#141210}
.score-pct{font-family:'Playfair Display',serif;font-size:34px;color:#c9a96e;line-height:1}
.score-lbl{font-size:10px;color:#6a6050;letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:24px}
.stat-c{background:#141210;border:1px solid #252018;border-radius:8px;padding:13px;text-align:center}
.stat-n{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;line-height:1;margin-bottom:4px}
.stat-n.g{color:#5fa876}
.stat-n.r{color:#c06060}
.stat-n.au{color:#c9a96e}
.stat-l{font-size:10px;color:#6a6050;letter-spacing:.07em;text-transform:uppercase}
.bk-title{font-family:'Playfair Display',serif;font-size:15px;color:#c9a96e;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #252018}
.bk-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bk-nm{font-size:12.5px;color:#b0a898;width:170px;flex-shrink:0}
.bk-bar-bg{flex:1;height:7px;background:#252018;border-radius:4px;overflow:hidden}
.bk-bar{height:100%;border-radius:4px;transition:width .7s .2s ease}
.bk-sc{font-size:11.5px;color:#6a6050;min-width:52px;text-align:right}
.eval-box{background:#141210;border:1px solid #252018;border-radius:8px;padding:18px;margin:20px 0}
.eval-hd{font-family:'Playfair Display',serif;font-size:14px;color:#c9a96e;margin-bottom:10px}
.eval-txt{font-size:13.5px;line-height:1.75;color:#b0a898}
.eval-txt .str{color:#5fa876;font-weight:500}
.eval-txt .imp{color:#c9a96e;font-weight:500}
.restart{width:100%;background:transparent;color:#c9a96e;border:1px solid #3a3020;border-radius:8px;padding:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .2s;letter-spacing:.02em}
.restart:hover{background:rgba(201,169,110,.08)}

@media(max-width:580px){
  .qtext{font-size:15px}
  .opt{font-size:13.5px}
  #hdr-title{font-size:11px}
  .res-stats{grid-template-columns:1fr 1fr}
  .bk-nm{width:120px;font-size:11px}
}
</style>
</head>
<body>

<div id="hdr">
  <div id="pbar-wrap"><div id="pbar"></div></div>
  <div id="hdr-inner">
    <span id="hdr-title">&#127891; EUR · Language Development · 50-Question Mock Exam</span>
    <div id="hdr-stats">
      <span id="cnt-correct">&#10003; 0</span>
      <span id="cnt-wrong">&#10007; 0</span>
      <span id="cnt-q">0 / 50</span>
    </div>
  </div>
</div>

<div id="dots"></div>

<div id="main">
  <div id="q-area"></div>
  <div id="results"></div>
</div>

<script>
const Qs = [
{q:"A 2-year-old has been correctly using <em>went</em> for several weeks. After caregivers begin modelling the regular <em>-ed</em> past-tense rule, he starts saying <em>goed</em>. A classmate argues: \u201cThis is ONLY evidence of developmental regression \u2014 the child has forgotten the correct irregular form.\u201d According to Shaffer & Kipp and Woolfolk, this argument is:",opts:["Correct \u2014 reappearance of an incorrect form after prior correct use indicates genuine memory failure","Incorrect \u2014 <em>goed</em> reflects overregularization: the child has actively extracted a grammatical rule and overapplied it, which is a sign of normal morphological development","Correct \u2014 overregularization is a regression that resolves automatically once caregivers systematically recast the irregular form","Incorrect \u2014 but the correct explanation is the sensitive-period hypothesis, not rule extraction"],ans:1,cat:"trap",why:"Overregularization is not regression \u2014 it is evidence of active rule extraction. The child first uses the correct form from memory, then discovers the <em>-ed</em> rule and overapplies it. This U-shaped curve (correct \u2192 overregularized \u2192 correct) is a hallmark of normal morphological development in both sources.",trap:"Trap: ONLY and \u2018forgotten\u2019 are absolute claims the text does not support. Both Shaffer & Kipp and Woolfolk describe this pattern as positive, not as regression.",src:"Shaffer & Kipp, Ch. 9, pp. 355\u2013356 (Overregularization); Woolfolk, Preschool, p. 69",tip:"U-shaped development = rule extraction, not regression. Parents often misread stage 2 as a setback. Know that this is the sign of a child actively theorising about grammar."},
{q:"Professor Yıldız shows students a graph demonstrating that as children\u2019s productive vocabulary grows beyond 100\u2013200 words, grammatical complexity scores rise sharply. The explanation from Shaffer & Kipp MOST consistent with the interactionist view is:",opts:["As vocabulary grows beyond 100\u2013200 words, social necessity compels children to organise their lexical knowledge grammatically in order to produce utterances that companions will understand","The LAD is activated once a critical vocabulary threshold is reached, triggering an innate grammatical module","Caregivers automatically begin modelling more complex grammar once children produce more words","The sensitive period for syntactic acquisition begins precisely when productive vocabulary exceeds this threshold"],ans:0,cat:"application",why:"Elizabeth Bates (1999), cited by Shaffer & Kipp (pp. 337\u2013338), argues that grammatical speech arises from social necessity: when children must communicate more than their limited word bank allows, they are driven to organise words grammatically. This is the interactionist account linking cognitive growth and social motivation.",trap:"Option B is nativist (LAD), not interactionist. Options C and D introduce unsupported mechanisms not found in the text.",src:"Shaffer & Kipp, Ch. 9, pp. 337\u2013338 (Fig. 9.3, Bates 1999, Environmental Supports for Language Development)",tip:"Interactionist explanations always combine biology <em>and</em> environment. Neither LAD-activation nor simple caregiver adjustment alone qualifies as interactionist."},
{q:"According to Shaffer & Kipp, \u201cchild-directed speech\u201d (also known as \u201cmotherese\u201d) is BEST described as:",opts:["A corrective strategy in which adults expand children\u2019s telegraphic utterances by supplying missing grammatical markers","A speech style used exclusively by mothers to model adult syntactic structures for children to imitate","Short, simple, high-pitched, and often repetitive sentences that adults use when talking with infants and toddlers, emphasising key words","A culturally specific communication style found primarily in Western industrialised societies"],ans:2,cat:"theory",why:"Shaffer & Kipp (p. 338) define motherese as the short, simple, high-pitched, repetitive utterances adults use with infants. These emphasise content words, are spoken slowly, and attract infant attention more than flat adult speech. It is <em>not</em> exclusive to mothers and is cross-cultural.",trap:"Option A defines \u2018expansions\u2019 \u2014 a related but distinct technique. Option B wrongly makes it mother-exclusive and syntactic-modelling. Option D wrongly limits it to Western cultures.",src:"Shaffer & Kipp, Ch. 9, p. 338 (Lessons from Child-Directed Speech; motherese defined in margin)",tip:"Know motherese vs. expansions vs. recasts \u2014 three distinct concepts that routinely appear as distractors for each other in EUR-style exams."},
{q:"According to Shaffer & Kipp, the transformation of structurally simple pidgins into grammatically complex creoles within a single generation provides evidence relevant to language acquisition theory because it demonstrates that:",opts:["Passive exposure to adult speech is sufficient to produce full grammatical competence","Morphological complexity invariably precedes syntactical complexity across all language types","Language is transmitted exclusively through cultural imitation, supporting the empiricist view","Children spontaneously create rule-governed grammar \u2014 including syntactical rules \u2014 even when adult input provides only a structurally impoverished model"],ans:3,cat:"theory",why:"According to Bickerton (cited in Shaffer & Kipp, p. 336), children of pidgin-speaking parents do not perpetuate the pidgin but spontaneously create creoles with full grammar. This is used as nativist evidence: children impose grammatical structure even without a fully grammatical adult model.",trap:"Option A is the opposite of what the evidence shows \u2014 pidgin input is impoverished yet grammar emerges. Option C is explicitly contradicted by the evidence.",src:"Shaffer & Kipp, Ch. 9, p. 336 (Focus on Research: Transforming Pidgins to True Languages; Bickerton, 1983, 1984)",tip:"Creole emergence = nativist evidence. Children constructing grammar spontaneously. Contrast this with the interactionist argument that <em>rich</em> social input drives language."},
{q:"According to Shaffer & Kipp, Chomsky\u2019s Language Acquisition Device (LAD) is BEST described as:",opts:["A set of specialised cognitive and perceptual processing abilities for language learning without innate knowledge of specific grammatical rules \u2014 analogous to Slobin\u2019s LMC","An inborn linguistic processor activated by verbal input that contains \u201cuniversal grammar\u201d \u2014 knowledge of rules common to all human languages","A brain region in the left hemisphere responsible for phonological discrimination in the first days of life","A hypothetical sensitive-period mechanism that enables rapid grammar learning only during early childhood"],ans:1,cat:"theory",why:"Chomsky proposed the LAD (p. 333) as an inborn processor containing <em>universal grammar</em> \u2014 rules common to all languages. When activated by verbal input, it allows children to infer phonological, semantic, and syntactic regularities of whatever language they hear.",trap:"Option A describes Slobin\u2019s LMC, not the LAD \u2014 this is the most common confusion. Option C describes real brain areas but not the LAD. Option D conflates the LAD with the sensitive period.",src:"Shaffer & Kipp, Ch. 9, p. 333 (The Nativist Perspective; LAD and universal grammar defined in margin)",tip:"LAD = innate grammar <em>knowledge</em>. LMC = innate processing <em>skills</em>, no innate rule knowledge. The presence or absence of innate rule-knowledge is the key distinction."},
{q:"According to Woolfolk (preschool chapter), \u201coverregularization\u201d refers to:",opts:["The application of a grammatical rule to irregular words where the rule does not apply \u2014 for example, saying <em>goed</em> instead of <em>went</em>","Using a known word to refer to a broader range of objects or events than adults do","Mixing vocabulary from two languages within a single sentence","The rapid acquisition of words before the cognitive system can assign precise meanings"],ans:0,cat:"theory",why:"Woolfolk (p. 69) defines overregularization as applying a grammatical rule to irregular words \u2014 saying <em>goed</em>, <em>foots</em>, <em>mouses</em>. Option B describes overextension (semantic broadening). Option C describes code-switching. Option D roughly describes fast mapping.",trap:"Options A and B are the main confusion pair: over<em>regularization</em> = grammatical rule over-applied; over<em>extension</em> = word meaning too broad. The \u2018over\u2019 prefix misleads students into treating them as synonyms.",src:"Woolfolk, Preschool Ch., p. 69 (Learning Grammar and Syntax)",tip:"Overextension = semantic error (meaning too broad). Overregularization = grammatical error (rule applied to irregulars). Know both definitions precisely."},
{q:"Twenty-month-old Roos hears a novel word for the first time: \u201cThe duck is gorping the bunny.\u201d In a subsequent looking-preference task, Roos looks longer at a video of a duck <em>causing</em> something to happen to a bunny than at one of both simply moving synchronously. According to Shaffer & Kipp, this MOST directly demonstrates:",opts:["Fast-mapping \u2014 Roos stored \u201cgorping\u201d as a novel sound pattern and matched it to a remembered action","The mutual exclusivity constraint \u2014 Roos eliminated known actions and assigned the novel word to an unfamiliar one","Syntactical bootstrapping \u2014 Roos used the verb-position cue in the sentence to infer that \u201cgorping\u201d denotes a causative action","The naming explosion \u2014 novel action verbs are acquired in a burst between 18 and 24 months"],ans:2,cat:"application",why:"This is the Naigles (1990) gorping study cited by Shaffer & Kipp (p. 349). The child uses the transitive verb position (subject-verb-object) to infer \u2018gorping\u2019 is causative. This is syntactical bootstrapping: syntax cues inform verb meaning.",trap:"Fast-mapping (A) is about quick word-referent pairing, not causativity inference. Mutual exclusivity (B) applies to object-label selection, not verb interpretation. Option D conflates vocabulary growth with a specific inferencing mechanism.",src:"Shaffer & Kipp, Ch. 9, p. 349 (Syntactical Clues to Word Meaning; Naigles, 1990; Hoff & Naigles, 2002)",tip:"Syntactical bootstrapping = inferring <em>meaning</em> from sentence structure, especially for verbs. Fast-mapping = quick object-label pairing. Know which mechanism applies to verbs vs. objects."},
{q:"A mother responds positively to her 2-year-old\u2019s utterance \u201cHim cow\u201d (truthful but ungrammatical), then corrects \u201cThere\u2019s a dog!\u201d when the child points at a cat (grammatical but false). According to Shaffer & Kipp, this pattern BEST illustrates that:",opts:["Parents systematically shape children\u2019s syntax by reinforcing grammatically well-formed sentences","Parents respond primarily to the truth value (semantic accuracy) of children\u2019s utterances rather than their grammatical correctness","Caregivers use topic extensions as their main strategy for correcting semantic errors in child speech","Parental correction of grammatical errors is inconsistent because adults simply attend to conversational content"],ans:1,cat:"trap",why:"This classic example from Shaffer & Kipp (p. 333, citing Baron, 1992; Brown, Cazden & Bellugi, 1969) shows parents approve truthful-but-ungrammatical speech and correct grammatically-correct-but-false speech. They respond to <em>truth value</em>, not grammar \u2014 directly undermining the empiricist reinforcement claim.",trap:"Trap qualifier: <em>primarily</em>. Option A is exactly what this example <em>disproves</em> \u2014 the learning perspective\u2019s prediction that parents reinforce correct grammar. Option D sounds similar to B but frames it as inconsistency; the text frames it as systematic responding to meaning.",src:"Shaffer & Kipp, Ch. 9, p. 333 (Evaluation of the Learning Perspective)",tip:"This example is used to refute Skinner. Always ask: what is the example <em>disproving</em>, not just what it illustrates. The empiricist reinforcement account fails here."},
{q:"According to Woolfolk (middle childhood, pp. 204\u2013209), the \u201csyntagmatic-paradigmatic shift\u201d in vocabulary organisation refers to:",opts:["The transition from using morphological inflections to using syntactic transformations in middle childhood","The development from receptive vocabulary dominance to expressive vocabulary dominance in the preschool years","The shift from concrete, personal word definitions to abstract, dictionary-like definitions","The change from associating words by what might come next in a sentence (syntactic order) to associating words by shared semantic meaning or category membership"],ans:3,cat:"comparison",why:"Woolfolk (pp. 206\u2013207) describes this shift as moving from syntactic associations (\u2018baby\u2019 \u2192 \u2018cries\u2019 \u2014 what comes next) to paradigmatic/semantic associations (\u2018baby\u2019 \u2192 \u2018infant, child\u2019 \u2014 same category). This reflects growing abstract thinking and vocabulary organisation ability.",trap:"Option C describes the shift in word <em>definitions</em> (also in Woolfolk), which is a related but different developmental change. The syntagmatic-paradigmatic shift is specifically about the basis for word <em>associations</em>, not definitions.",src:"Woolfolk, Middle Childhood Ch., pp. 206\u2013207 (Organising All Those Words; syntagmatic-paradigmatic shift)",tip:"Syntagmatic = sequential/syntactic (what comes next in a sentence). Paradigmatic = categorical/semantic (what belongs to the same category). The shift goes syn \u2192 par with cognitive development."},
{q:"According to Shaffer & Kipp, \u201cvocables\u201d are BEST defined as:",opts:["Vowel-like sounds produced by infants at approximately 2 months of age during periods of contentment","The first two-word combinations produced during the telegraphic period","Unique patterns of sound that prelinguistic infants use to represent objects, actions, or events \u2014 indicating that certain sounds carry consistent meanings","Grammatical morphemes that precede content words in children\u2019s earliest sentences"],ans:2,cat:"theory",why:"Vocables are defined in the margin of Shaffer & Kipp (p. 329) as unique sound patterns prelinguistic infants use to represent objects, actions, or events. They signal the infant is aware that sounds have consistent meaning \u2014 a precursor to true words.",trap:"Option A describes <em>coos</em> (p. 342) \u2014 a different term from the same chapter. Option B describes telegraphic speech. Option D describes bound morphemes. All four are Ch. 9 terms \u2014 a classic EUR multi-term distractor set.",src:"Shaffer & Kipp, Ch. 9, p. 329 (margin: vocables) and p. 343",tip:"Learn all margin glossary terms in Ch. 9: coos, babbles, vocables, holophrases, telegraphic speech. They appear as distractors for each other repeatedly in EUR exams."},
{q:"According to Woolfolk (middle childhood), what is the KEY distinction between \u201cconjunctives\u201d (e.g., <em>now, so, then</em>) and \u201cdisjunctives\u201d (e.g., <em>however, although, anyway</em>) in children\u2019s language development?",opts:["Conjunctives, understood by most children by age 6, introduce information consistent with the overall message; disjunctives, not fully mastered until around age 12, signal information that is inconsistent or contrary \u2014 making disjunctives a more complex linguistic form","Conjunctives are acquired only after disjunctives because they appear less frequently in child-directed speech","Both types are understood by age 6, but disjunctives remain restricted to formal written language until early adolescence","Conjunctives require explicit metalinguistic awareness; disjunctives are acquired implicitly through imitation"],ans:0,cat:"comparison",why:"Woolfolk (p. 208) specifies: conjunctives (understood by age 6) introduce consistent information; disjunctives (not mastered until ~age 12) signal contrary or inconsistent information. Disjunctives require holding two conflicting propositions simultaneously \u2014 hence the later acquisition.",trap:"Option B reverses the order \u2014 conjunctives are acquired <em>first</em>, not second. Option C is wrong \u2014 the text does not restrict disjunctives to written language.",src:"Woolfolk, Middle Childhood Ch., p. 208 (Conversations)",tip:"Dis-junctives = dis-agreement signals. They require cognitive flexibility to signal contradiction. The \u2018dis-\u2019 prefix can help you remember: they signal something going <em>against</em> expectation."},
{q:"According to Shaffer & Kipp, what is the key distinction between \u201cdeclarative gestures\u201d and \u201cimperative gestures\u201d in prelinguistic infants?",opts:["Declarative gestures involve gross motor movements; imperative gestures are limited to pointing with the index finger","Declarative gestures direct others\u2019 attention to an object or event; imperative gestures aim to persuade others to perform an action or fulfil a request","Declarative gestures appear only after the emergence of first words; imperative gestures are exclusively prelinguistic","Declarative gestures communicate positive affect; imperative gestures signal frustration"],ans:1,cat:"comparison",why:"Shaffer & Kipp (p. 344) define declarative gestures as directing others\u2019 attention to an object (joint attention function) and imperative gestures as requesting actions from others. Both appear in the prelinguistic period (8\u201310 months), so the distinction is about <em>function</em>, not timing or physical form.",trap:"Options A, C, and D introduce physical, timing, or affective distinctions not found in the text. Option C is factually wrong \u2014 both types appear before first words.",src:"Shaffer & Kipp, Ch. 9, p. 344 (Gestures and Nonverbal Communication)",tip:"Declarative = \u2018Look at that!\u2019 (joint attention). Imperative = \u2018Give me that!\u2019 (request action). Pragmatic function is the distinguishing criterion."},
{q:"According to Woolfolk (middle childhood), the claim that figurative language \u2014 such as idioms (\u201ceat your heart out\u201d) and metaphors \u2014 is PRIMARILY acquired through direct classroom instruction during middle childhood is:",opts:["Well supported \u2014 systematic vocabulary instruction is the most efficient pathway to idiomatic competence","Partially supported \u2014 instruction helps with idioms, but metaphors are acquired exclusively through conversational exposure","Supported for students from lower SES backgrounds but not for higher SES students, who acquire idioms informally","Not supported \u2014 children understand figurative language before they produce it, and better readers acquire idioms faster regardless of direct instruction"],ans:3,cat:"trap",why:"Woolfolk (p. 207) states that children understand metaphors and idioms before they produce them, and that better readers learn idioms faster. There is no claim that direct instruction is the <em>primary</em> route. The trap is the word PRIMARILY.",trap:"Trap qualifier: PRIMARILY. The text emphasises comprehension-before-production and reading skill as key factors \u2014 not instruction as primary mechanism. Options A, B, C all accept the premise that instruction drives acquisition, which the text does not state.",src:"Woolfolk, Middle Childhood Ch., p. 207 (Having Fun with Words; Nippold, Moran & Schwartz, 2001)",tip:"PRIMARILY is a strong qualifier. Does the source identify this as the <em>primary</em> mechanism? If not \u2014 and here it clearly doesn\u2019t \u2014 any option using this word as the mechanism is wrong."},
{q:"Genie, discovered at age 13 after years of severe linguistic deprivation, subsequently learned many word meanings and produced semantically rich sentences. Yet she never mastered the rules of syntax. According to Shaffer & Kipp, her profile MOST strongly supports:",opts:["The learning perspective \u2014 the absence of grammatical reinforcement during early childhood produced permanent syntactic deficits","The nativist view \u2014 her LAD remained functional for semantic learning but was permanently deactivated for syntax after a critical vocabulary threshold","The sensitive-period hypothesis \u2014 the critical window for syntactic acquisition had already closed before intervention began, while semantic learning remained partly possible","The interactionist view \u2014 social deprivation affected all aspects of language equally, including both syntax and semantics"],ans:2,cat:"application",why:"Shaffer & Kipp (p. 335) use Genie\u2019s case explicitly to illustrate the sensitive-period hypothesis. The pattern of preserved semantics but absent syntax suggests the syntactic acquisition window closed before intervention, while semantic learning remained more open-ended.",trap:"Option B sounds nativist but is fabricated \u2014 no LAD \u2018deactivation\u2019 is described in the text. Option D contradicts the evidence: semantics was partly preserved, so deprivation did NOT affect everything equally.",src:"Shaffer & Kipp, Ch. 9, p. 335 (The Sensitive-Period Hypothesis; Curtiss, 1977, 1988)",tip:"Genie\u2019s pattern: semantics preserved, syntax absent = evidence for a <em>domain-specific</em> sensitive period for syntax. Also compare to Chelsea, who shows the same pattern."},
{q:"Four-year-old Brian is shown two objects: a familiar key and an unfamiliar vacuum stopper. An adult asks, \u201cCan you give me the blicket?\u201d Without being told which object the word refers to, Brian selects the vacuum stopper. According to Woolfolk (preschool chapter), this behaviour is MOST directly explained by:",opts:["Fast-mapping \u2014 Brian quickly located \u201cblicket\u201d on his existing mental map of language","Syntactical bootstrapping \u2014 the noun position of \u201cblicket\u201d signalled it referred to a whole object","The mutual exclusivity constraint \u2014 Brian knows \u201ckey\u201d already has a label, so \u201cblicket\u201d must refer to the unknown object","The taxonomic constraint \u2014 Brian selects the object belonging to the same perceptual category as the most familiar item"],ans:2,cat:"application",why:"Woolfolk (p. 69, citing Jaswal & Hansen, 2006) uses this blicket task to illustrate mutual exclusivity: Brian assumes each object has one and only one label. Since he knows the key\u2019s name, \u2018blicket\u2019 must belong to the unknown object.",trap:"Fast-mapping (A) is about quickly learning meaning from minimal exposure; it does not explain <em>why</em> the unknown object is chosen. Syntactical bootstrapping (B) applies to inferring verb meanings, not object selection. Option D introduces a constraint not highlighted in this context.",src:"Woolfolk, Preschool Ch., p. 69 (Vocabulary and Meaning; Markman, 1992; Jaswal & Hansen, 2006)",tip:"Mutual exclusivity = each object has exactly one label. When a known label exists for object A, a novel word must refer to object B. This is a processing constraint, not just guessing."},
{q:"According to Shaffer & Kipp (Table 9.5, Brown\u2019s acquisition sequence), a child who uses the present progressive (<em>-ing</em>) correctly and consistently but has not yet acquired articles (<em>the, a</em>) is MOST accurately described as:",opts:["Showing atypical development \u2014 articles should precede <em>-ing</em> according to Brown\u2019s sequence","Following Brown\u2019s expected acquisition order \u2014 the present progressive (<em>-ing</em>, position #1) is acquired substantially earlier than articles (position #8)","In a stage that cannot be determined without knowing the child\u2019s productive vocabulary size","Displaying a pattern characteristic of telegraphic speech, which retains <em>-ing</em> but omits articles"],ans:1,cat:"application",why:"Brown\u2019s (1973) acquisition order in Table 9.5 (p. 355) lists <em>-ing</em> as #1 and articles as #8. A child with <em>-ing</em> but not articles is following the expected sequence precisely.",trap:"Option A reverses the order \u2014 the single most common error on this topic. Option C is a plausible-sounding caveat but is wrong \u2014 the acquisition order is established independently of vocabulary size.",src:"Shaffer & Kipp, Ch. 9, p. 355, Table 9.5 (Development of Grammatical Morphemes; Brown, 1973)",tip:"Memorise the first 5 morphemes in Brown\u2019s order: (1) -ing, (2) in, (3) on, (4) plural -s, (5) past irregular. Articles come at #8. Exam questions often reverse early entries with later ones."},
{q:"According to Shaffer & Kipp, which theoretical perspective holds that children learn language by imitating what they hear and being reinforced when they produce grammatically correct speech?",opts:["The learning (empiricist) perspective, most prominently associated with B.F. Skinner, which holds that caregivers shape speech by reinforcing sounds resembling words and later by reinforcing word combinations and sentences","The nativist perspective, which posits innate language processing capacities that guide grammar acquisition independently of social reinforcement","The interactionist perspective, which attributes language development to a complex interplay of biological maturation, cognitive growth, and the linguistic environment","The sociocultural perspective, which attributes language acquisition primarily to guided participation in cultural practices with more competent partners"],ans:0,cat:"theory",why:"Shaffer & Kipp (p. 332) identify the learning/empiricist perspective \u2014 associated with Skinner, Bandura, Whitehurst \u2014 as the view that children imitate adult speech and are reinforced for correct grammar. Caregivers \u2018teach\u2019 language by modelling and reinforcing.",trap:"All four options name real perspectives discussed in Ch. 9, making this a four-way theoretical distractor. Key identifier for the learning perspective: IMITATION + REINFORCEMENT operating together.",src:"Shaffer & Kipp, Ch. 9, p. 332 (The Learning or Empiricist Perspective; Skinner, 1957)",tip:"Three core theories in Ch. 9: Learning (imitation/reinforcement) \u2022 Nativist (LAD/LMC innate) \u2022 Interactionist (bio + cognition + environment). Know the identifying feature of each."},
{q:"According to Shaffer & Kipp, the sensitive-period hypothesis for language acquisition was originally motivated by which empirical observation?",opts:["Children worldwide reach the same linguistic milestones at approximately the same age, suggesting biological programming","Brain-imaging studies show that speech sounds activate the left hemisphere even in newborns, demonstrating early lateralisation","Deaf children raised by hearing parents develop language consistently later than hearing children raised by deaf parents","Child aphasics frequently recover lost language functions spontaneously without therapy, whereas adult aphasics typically require extensive intervention to recover even partially"],ans:3,cat:"trap",why:"Shaffer & Kipp (p. 335) explicitly state that Lenneberg\u2019s (1967) sensitive-period hypothesis was prompted by the observation that child aphasics often recover spontaneously while adult aphasics do not. The right hemisphere can assume language functions in a child but not after the brain is fully specialised post-puberty.",trap:"Trap: linguistic universals (option A) support nativist claims generally, not the sensitive period specifically. Option B is cited as evidence for early lateralisation \u2014 a related but distinct point. Many students choose A because it sounds like a sensible motivation, but the text specifies aphasia recovery.",src:"Shaffer & Kipp, Ch. 9, pp. 334\u2013335 (The Sensitive-Period Hypothesis; Lenneberg, 1967)",tip:"The sensitive-period hypothesis was motivated by <em>clinical</em> aphasia recovery data, not by milestone universals. Know the specific empirical motivation; EUR exams test precision of attribution."},
{q:"A researcher finds that fully bilingual children significantly outperform monolinguals on tasks requiring detection of grammatical errors in written and spoken language. According to Woolfolk (preschool chapter), the MOST plausible explanation grounded in the text is:",opts:["Bilingual children receive more explicit grammar instruction at home due to parents\u2019 heightened awareness of dual-language demands","Bilingual children develop more advanced metalinguistic awareness \u2014 they learn early that linguistic representations are arbitrary, because two different words across their two languages map onto the same concept","Bilingual children have larger combined vocabularies, giving them more semantic contrasts from which to extract grammatical patterns","Caregivers of bilingual children use more child-directed speech overall, increasing exposure to well-formed grammatical models"],ans:1,cat:"application",why:"Woolfolk (p. 67, citing Bialystok, 2001) attributes the bilingual metalinguistic advantage specifically to the early experience of arbitrary symbol-referent mappings: bilingual children learn that the <em>same</em> concept is labelled with two entirely different sound patterns, revealing the arbitrariness of language itself.",trap:"Option C (larger combined vocabulary) is plausible but is not the mechanism stated in the text. Woolfolk specifically attributes the advantage to <em>metalinguistic awareness</em> arising from exposure to arbitrary mappings \u2014 not vocabulary size per se.",src:"Woolfolk, Preschool Ch., p. 67 (Benefits of Bilingualism; Bialystok, 2001; Bialystok, Majumder & Martin, 2003)",tip:"The text gives a specific causal mechanism: arbitrary word-concept mappings across two languages. Not vocabulary, not instruction. When a question asks about the mechanism, precision matters."},
{q:"According to Shaffer & Kipp, the term \u201ctelegraphic speech\u201d refers to the early two- and three-word utterances of children approximately 18\u201324 months old. What makes these utterances \u201ctelegraphic\u201d?",opts:["They contain only the critical content words \u2014 nouns, verbs, adjectives \u2014 and omit less important grammatical elements such as articles, prepositions, and auxiliary verbs","They rely entirely on rising or falling intonation to signal questions and statements, with no syntactic differentiation","They consist of holophrases strung together in sequence to convey multi-propositional meaning","They mirror adult sentence structure but compress it into the minimum number of articulated syllables the child can produce"],ans:0,cat:"theory",why:"Shaffer & Kipp (p. 350) explain that telegraphic speech earned its name \u2014 like a telegram \u2014 because it contains only critical content words (nouns, verbs, adjectives) and omits less important function words: articles, prepositions, pronouns, auxiliary verbs.",trap:"Option C confuses telegraphic speech with the holophrase period (which precedes it). Option B describes intonation use during holophrases. Option D misrepresents the concept entirely.",src:"Shaffer & Kipp, Ch. 9, p. 350 (The Telegraphic Period: From Holophrases to Simple Sentences)",tip:"Telegraphic \u2260 holophrases. Telegraphic = 2\u20133 words, 18\u201324 months, omits function words. Holophrases = 1 word, 10\u201318 months, represents full sentence worth of meaning."},
{q:"According to Shaffer & Kipp, Roger Brown (1973) studied three children longitudinally and found they all acquired 14 English grammatical morphemes in the same order, despite very different vocabulary sizes. Brown ULTIMATELY attributed this uniform order to:",opts:["The frequency with which each morpheme appeared in caregivers\u2019 speech \u2014 more frequent morphemes were acquired first","The age at which each morpheme was first introduced in each child\u2019s linguistic environment","The number of times parents used recasts specifically targeting each morpheme type","The semantic and syntactic complexity of each morpheme \u2014 less complex morphemes were consistently acquired before more complex ones"],ans:3,cat:"methods",why:"Shaffer & Kipp (pp. 355\u2013356) report that Brown tested and then <em>rejected</em> the frequency hypothesis (option A), finding frequency did not predict order. He concluded that semantic and syntactic complexity explained the uniform sequence: simpler morphemes emerge first.",trap:"Option A is Brown\u2019s REJECTED hypothesis \u2014 the most tempting distractor. Many students confuse his initial hypothesis with his final conclusion. The answer must reflect what he ultimately found, not what he started with.",src:"Shaffer & Kipp, Ch. 9, pp. 355\u2013356 (Development of Grammatical Morphemes; Brown, 1973)",tip:"Brown: reject frequency \u2192 accept complexity. EUR questions frequently present the rejected hypothesis as a distractor. Always track what a researcher <em>concluded</em>, not what they initially predicted."},
{q:"According to Shaffer & Kipp, \u201creceptive language\u201d is defined as:",opts:["The ability to express ideas through spoken words and accompanying gestures","The ability to comprehend what others say \u2014 what an individual understands when listening to others\u2019 speech","The process of decoding written symbols into their spoken phonological representations","The system of nonverbal signals used to supplement verbal messages in face-to-face interaction"],ans:1,cat:"theory",why:"Shaffer & Kipp (p. 344) define receptive language in the margin as \u2018that which the individual comprehends when listening to others\u2019 speech.\u2019 It contrasts with productive language (expression). Receptive language is consistently ahead of productive language from ~12 months.",trap:"Option A defines <em>productive</em> language. Option C describes reading decoding, not oral receptive language. Option D describes nonverbal communication, a related but different concept.",src:"Shaffer & Kipp, Ch. 9, p. 344 (margin definitions: receptive language, productive language)",tip:"Receptive > Productive throughout early development. Children understand far more words than they can produce. Know this asymmetry and when it begins (~12\u201313 months)."},
{q:"According to Shaffer & Kipp, what is the key distinction between \u201cfree morphemes\u201d and \u201cbound morphemes\u201d?",opts:["Free morphemes are acquired during the prelinguistic phase; bound morphemes are acquired during the telegraphic period","Free morphemes are universal across all languages; bound morphemes are language-specific and therefore acquired later","Free morphemes can stand alone as words (e.g., <em>dog, go</em>); bound morphemes cannot stand alone but modify meaning when attached to a free morpheme (e.g., <em>-s, -ed, -\u2019s</em>)","Free morphemes convey grammatical information; bound morphemes carry the primary lexical meaning of words"],ans:2,cat:"comparison",why:"Shaffer & Kipp (p. 331) define free morphemes as words that can stand alone (<em>cat, dog, yellow</em>) and bound morphemes as those that cannot stand alone but change meaning when attached (<em>-s</em> on <em>dogs</em> signals plurality).",trap:"Option D reverses the functions: free morphemes carry the primary lexical meaning (<em>dog</em>) and bound morphemes convey grammatical information (<em>-s</em>). This reversal is a frequent EUR trap.",src:"Shaffer & Kipp, Ch. 9, p. 331 (Semantics; free morphemes and bound morphemes defined in margin)",tip:"Free = standalone word with primary meaning. Bound = grammatical modifier that cannot stand alone. \u2018Dogs\u2019 = free (<em>dog</em>) + bound (<em>-s</em>). Do not reverse their functions."},
{q:"Deaf children in Nicaragua, initially schooled separately and using idiosyncratic home gestures, pooled their gestures into a pidgin-like system. Within one generation, subsequent children spontaneously transformed this into fully grammatical Nicaraguan Sign Language. According to Shaffer & Kipp, this provides STRONGEST support for:",opts:["The nativist perspective \u2014 children created full, grammatically complex language spontaneously without being taught by any competent language model","The learning perspective \u2014 children systematically imitated each other\u2019s most frequently used gestures","The interactionist perspective \u2014 social contact between children <em>alone</em>, not any innate mechanism, drove the emergence of grammar","Neither perspective \u2014 institutional scaffolding in a school environment was required for the outcome to occur"],ans:0,cat:"application",why:"Shaffer & Kipp (p. 336) present Nicaraguan Sign Language as nativist evidence: children imposed full grammatical structure without any adult model of a complete language. This suggests children have linguistic predispositions that drive grammatical organisation.",trap:"Option C sounds plausible (social contact) but Shaffer & Kipp specifically present this as nativist evidence because grammar emerged <em>without</em> a rich adult model. If it were purely interactionist, rich input would be required.",src:"Shaffer & Kipp, Ch. 9, p. 336 (Focus on Research: Creating a Sign Language; Senghas, Kita & Ozyurek, 2004)",tip:"Nicaraguan Sign Language = nativist evidence. Compare to pidgin-to-creole transformation (same argument). Children spontaneously impose grammar where none existed."},
{q:"According to Shaffer & Kipp, the \u201cnaming explosion\u201d (vocabulary spurt) is MOST accurately described as:",opts:["The initial emergence of first meaningful words at approximately 10\u201313 months of age","A dramatic acceleration in vocabulary acquisition \u2014 typically occurring between 18 and 24 months \u2014 during which toddlers may add 10\u201320 new words per week","The rapid acquisition of grammatical morphemes that coincides with the end of the telegraphic period in the third year","A sudden increase in sentence length following mastery of transformational grammar at approximately age 3"],ans:1,cat:"theory",why:"Shaffer & Kipp (p. 345) describe the naming explosion as a dramatic acceleration at 18\u201324 months when toddlers may add 10\u201320 new words per week, reflecting the realisation that everything has a name. The naming explosion margin definition is explicit on this timeline.",trap:"Option A describes the holophrase period (first words at 10\u201313 months) \u2014 the stage <em>before</em> the naming explosion. Option C describes the grammatical morpheme period. Option D describes transformational grammar mastery.",src:"Shaffer & Kipp, Ch. 9, p. 345 (Early Semantics: Building a Vocabulary; naming explosion defined in margin)",tip:"Language timeline: First words ~10\u201313 months \u2192 Naming explosion ~18\u201324 months \u2192 Grammatical morphemes ~3rd year \u2192 Transformational grammar ~3\u20135 years. Know each milestone and its age."},
{q:"According to Shaffer & Kipp, \u201cpragmatics\u201d is BEST defined as:",opts:["The rules specifying how words are combined to form meaningful phrases and sentences","The sound system of a language, including phonemes and the rules for combining them to produce meaningful units","The principles that underlie the effective and appropriate use of language in social contexts \u2014 including sociolinguistic knowledge about when and how language should be used in particular situations","The meaning expressed in words and sentences, encompassing both free and bound morphemes"],ans:2,cat:"theory",why:"Shaffer & Kipp (p. 331) define pragmatics as the principles that underlie the effective and appropriate use of language to communicate, plus sociolinguistic knowledge \u2014 culturally specified rules for how language should be used in particular situations.",trap:"Option A = syntax. Option B = phonology. Option D = semantics. All five language components appear as distractors in questions about any one component. Memorise all five definitions.",src:"Shaffer & Kipp, Ch. 9, p. 331 (Pragmatics; sociolinguistic knowledge defined in margin)",tip:"Five components: Phonology (sounds) \u2022 Morphology (word structure) \u2022 Semantics (meaning) \u2022 Syntax (sentence rules) \u2022 Pragmatics (social use). All five appear on EUR exams."},
{q:"According to Woolfolk (preschool chapter), \u201cfast-mapping\u201d is BEST described as:",opts:["A developmental achievement through which children memorise irregular verb forms via repeated parental modelling and correction","The process by which children quickly locate the approximate meaning of a new word after minimal exposure \u2014 as few as one hearing \u2014 by anchoring it to their existing mental map of language","The simultaneous acquisition of a word\u2019s phonological form and syntactic category through sentence-position cues","A strategy whereby children use the mutual exclusivity constraint to rapidly eliminate known labels and assign a novel word to an unfamiliar referent"],ans:1,cat:"theory",why:"Woolfolk (p. 69, citing Halberda, 2003) defines fast-mapping as quickly locating the approximate meaning of a new word after minimal exposure. If a child already knows \u2018blue\u2019 is a colour, they can fast-map \u2018turquoise\u2019 as another colour after one hearing.",trap:"Option D (mutual exclusivity) is a processing constraint that can co-occur with fast-mapping but is a distinct mechanism. Option C describes syntactical bootstrapping. They are all related but must be kept separate.",src:"Woolfolk, Preschool Ch., p. 69 (Vocabulary and Meaning; Halberda, 2003a; Mintz, 2005)",tip:"Fast-mapping = quick approximate meaning after minimal exposure, using existing word knowledge as an anchor. It is fast but initially imprecise \u2014 refinement requires further exposure."},
{q:"According to Shaffer & Kipp, what is the KEY conceptual difference between Chomsky\u2019s Language Acquisition Device (LAD) and Slobin\u2019s Language-Making Capacity (LMC)?",opts:["The LAD contains innate universal grammar \u2014 knowledge of rules common to all languages; the LMC consists of innate cognitive and perceptual processing abilities specialised for language learning but does NOT include innate knowledge of specific grammatical rules","The LMC is unique to humans; the LAD can also explain the limited linguistic abilities seen in trained apes","The LMC requires active social interaction to operate; the LAD is activated by passive verbal exposure alone","The LAD accounts for morphological acquisition; the LMC is restricted to explaining syntactic development"],ans:0,cat:"comparison",why:"Shaffer & Kipp (p. 333) draw this distinction explicitly: the LAD contains <em>universal grammar</em> (innate rule knowledge). Slobin\u2019s LMC consists of <em>cognitive and perceptual abilities</em> for language learning but, crucially, does NOT assume any innate knowledge of specific rules.",trap:"Options B, C, D introduce distinctions not made in the text. The definitive axis is: LAD = innate rule knowledge; LMC = innate processing skills, no rule knowledge.",src:"Shaffer & Kipp, Ch. 9, p. 333 (The Nativist Perspective; LAD, universal grammar, LMC defined in margin; Slobin, 1985)",tip:"LAD vs LMC axis: <em>knowledge</em> vs <em>ability</em>. LAD knows the rules. LMC knows how to learn. This distinction appears frequently in EUR theory questions."},
{q:"According to Woolfolk (middle childhood, pp. 204\u2013209), \u201cmetalinguistic awareness\u201d is BEST described as:",opts:["The pragmatic skill of adjusting speech style and vocabulary to suit different social audiences","The process of mapping written orthographic symbols onto spoken phonological representations","The ability to understand and produce figurative language, including idioms, metaphors, and similes","Explicit knowledge about language as a formal system \u2014 the ability to think about, reflect on, and comment on the properties of language, beyond merely using it for communication"],ans:3,cat:"theory",why:"Woolfolk (p. 209) defines metalinguistic awareness as explicit, reflective knowledge about language itself: the ability to think about and comment on language properties (e.g., verb tense correctness, subject-verb agreement) rather than simply using language to communicate.",trap:"Option A describes pragmatics (audience adjustment). Option B describes phonological decoding in reading. Option C describes figurative language \u2014 which is an <em>outcome</em> of metalinguistic awareness, not its definition.",src:"Woolfolk, Middle Childhood Ch., p. 209 (Metalinguistic Awareness; Frost, 2000; Purcell-Gates, 2001)",tip:"Meta = about language. Metalinguistic awareness = knowing ABOUT language, not just using it. Children who have it can consciously correct their own grammar and recognise when others\u2019 speech is incorrect."},
{q:"According to Shaffer & Kipp, which of the following is a point of AGREEMENT between the nativist perspective and the interactionist perspective on language development?",opts:["An innate Language Acquisition Device (LAD) or Language-Making Capacity (LMC) is required to explain grammatical development","Social interaction is the primary driving force behind children\u2019s language acquisition","Children are biologically prepared for language acquisition \u2014 both perspectives accept that biology plays a role, even though they differ on the nature and mechanisms of that preparation","Language development proceeds largely independently of general cognitive development"],ans:2,cat:"comparison",why:"Shaffer & Kipp (p. 337) explicitly state that interactionists, like nativists, believe children are biologically prepared for language. The difference: nativists propose a specialised LAD/LMC; interactionists attribute it to a slowly maturing general brain, not a specialised module.",trap:"Option A is nativist-only \u2014 interactionists explicitly reject the LAD/LMC. Option B is interactionist/learning-only \u2014 nativists claim social interaction is unnecessary. Option D is stated by neither perspective in the text.",src:"Shaffer & Kipp, Ch. 9, p. 337 (The Interactionist Perspective: Biological and Cognitive Contributors)",tip:"Agreement: both accept biological preparation. Disagreement: nativists \u2014 specialised LAD/LMC; interactionists \u2014 general maturing brain + environment. The <em>type</em> of biological preparation is the crux of the dispute."},
{q:"According to Woolfolk (preschool chapter), the smallest unit of sound that can affect meaning in a language is called:",opts:["A vocable","A morpheme","A phoneme \u2014 for example, the initial /k/ sound changes \u201cat\u201d to \u201ccat\u201d","A grapheme"],ans:2,cat:"theory",why:"Woolfolk (p. 67) defines a phoneme as the smallest unit of sound that can affect meaning. The /k/ phoneme example is given explicitly: it changes \u2018at\u2019 to \u2018cat.\u2019 Phonology is the study of how phonemes function in a language system.",trap:"Option B (morpheme) is the smallest unit of <em>meaning</em>, not the smallest unit of <em>sound that affects meaning</em>. This phoneme/morpheme confusion is among the most frequently tested distinctions in language development courses.",src:"Woolfolk, Preschool Ch., p. 67 (Sounds and Pronunciation; Phonology)",tip:"Phoneme = sound unit (changes meaning when substituted). Morpheme = meaning unit. \u2018Dog\u2019 has 3 phonemes (/d/ /\u0254/ /g/) but 1 morpheme. Do not confuse the two levels."},
{q:"According to Shaffer & Kipp, what is the key distinction between an \u201cexpansion\u201d and a \u201crecast\u201d as forms of adult response to a child\u2019s ungrammatical speech?",opts:["An expansion introduces new vocabulary; a recast introduces new grammatical structure without adding vocabulary","A recast is used only during the telegraphic period; expansions begin at the holophrase stage","An expansion is used exclusively by mothers; a recast is also used by older siblings and fathers","An expansion is a grammatically correct and enriched version of the child\u2019s own utterance; a recast rephrases the child\u2019s utterance as a non-repetitive, grammatically correct alternative statement"],ans:3,cat:"comparison",why:"Shaffer & Kipp (p. 339) define expansions as grammatically correct and enriched versions of the child\u2019s own words. Recasts are non-repetitive: they rephrase the idea in a new grammatically correct form (often a question or statement with novel vocabulary), attracting attention to new grammatical patterns.",trap:"Options A, B, C introduce distinctions (vocabulary, timing, speaker) not made in the text. Both expansions and recasts provide negative evidence about grammar without direct correction \u2014 they differ in whether they directly build on the child\u2019s own words.",src:"Shaffer & Kipp, Ch. 9, p. 339 (Lessons from Negative Evidence; expansions and recasts defined in margin)",tip:"Expansion = enriched repeat of child\u2019s own sentence. Recast = non-repetitive grammatically correct alternative. Both are indirect grammar corrections. Know the distinction clearly."},
{q:"According to Shaffer & Kipp, 2-year-old Luca is playing with three unfamiliar objects. A second adult enters, views the objects, then leaves. When the adult returns and exclaims \u201cLook, a gazzer!\u201d without pointing, Luca maps \u201cgazzer\u201d onto the object the second adult had not previously seen. This demonstrates that 2-year-olds:",opts:["Have mastered the object scope constraint and apply it automatically to all novel noun labels","Use social and contextual cues \u2014 specifically, knowledge of what another person has and has not seen \u2014 to infer the referential intent of a novel word","Apply the mutual exclusivity constraint to eliminate all familiar objects from the array simultaneously","Use syntactical bootstrapping to identify the noun referent of a novel label based on sentence position"],ans:1,cat:"application",why:"Shaffer & Kipp (p. 348, citing Akhtar, Carpenter & Tomasello, 1996) describe this study to show that 2-year-olds use social perspective-taking: \u2018The adult hasn\u2019t seen the fourth object \u2014 that must be the gazzer.\u2019 This goes beyond mutual exclusivity to inferring referential intent.",trap:"Mutual exclusivity (C) could contribute \u2014 Luca knows other objects\u2019 names \u2014 but the SPECIFIC inference demonstrated is <em>perspective-taking</em> about what the adult has and hasn\u2019t seen, which the text highlights as the key mechanism here.",src:"Shaffer & Kipp, Ch. 9, p. 348 (Strategies for Inferring Word Meanings; Akhtar, Carpenter & Tomasello, 1996)",tip:"Social/contextual cue inference > mutual exclusivity when the task requires perspective-taking. Luca uses theory of mind about what the adult knows. This distinguishes the gazzer study from simpler object-selection tasks."},
{q:"According to Shaffer & Kipp, injuries to Broca\u2019s area \u2014 located in the frontal lobe of the left cerebral hemisphere \u2014 primarily affect which language function?",opts:["Speech production but not comprehension \u2014 consistent with Broca\u2019s area\u2019s role in language output","Speech comprehension but not production \u2014 consistent with Wernicke\u2019s area, not Broca\u2019s","Both production and comprehension equally, because Broca\u2019s area integrates both language functions","Prosody and intonation only, leaving core grammatical and syntactic processing intact"],ans:0,cat:"application",why:"Shaffer & Kipp (p. 334) state: \u2018Injuries to Broca\u2019s area typically affect speech production and not comprehension.\u2019 This creates the classic Broca\u2019s aphasia profile: the person understands language but cannot produce it fluently.",trap:"Option B describes Wernicke\u2019s aphasia \u2014 the classic A/B swap. Broca\u2019s = production deficit; Wernicke\u2019s = comprehension deficit. This confusion is extremely common and deliberately exploited in EUR exam distractors.",src:"Shaffer & Kipp, Ch. 9, p. 334 (Brain Specialisation and Language; Broca\u2019s area and Wernicke\u2019s area defined in margin)",tip:"Broca = production (front of brain = speaking). Wernicke = comprehension (temporal lobe = hearing). Know both areas and both deficits. This is tested in every language development exam."},
{q:"Three-year-old Mia previously said \u201cwent\u201d correctly. After her parents begin modelling the regular <em>-ed</em> rule, Mia starts saying \u201cgoed.\u201d Her parents worry she is regressing. According to Shaffer & Kipp and Woolfolk, what should they be told?",opts:["Their concern is justified \u2014 overregularization shows Mia has lost access to previously stored irregular forms and requires corrective recasting","Their concern is justified \u2014 Mia\u2019s <em>-ed</em> overextension indicates the sensitive period for irregular verb storage has ended","Their concern is unfounded \u2014 \u201cgoed\u201d demonstrates active grammatical rule extraction and overapplication, which is a positive sign of normal, rule-governed morphological development","Their concern is unfounded \u2014 Mia is applying syntactical bootstrapping to generate a new verb form from a perceived pattern"],ans:2,cat:"application",why:"Both Shaffer & Kipp (p. 356) and Woolfolk (p. 69) are explicit: overregularization errors are NOT regression. They signal that the child has extracted the <em>-ed</em> rule and applies it systematically \u2014 even to words formerly produced correctly from memory. This is cognitively more sophisticated than rote repetition.",trap:"Options A and B both validate the parental concern \u2014 both are wrong. The U-shaped development pattern (correct \u2192 overregularized \u2192 correct) is described as developmental progress, not deficit. Option D misapplies syntactical bootstrapping.",src:"Shaffer & Kipp, Ch. 9, pp. 355\u2013356 (Overregularization; Marcus et al., 1992); Woolfolk, Preschool, p. 69",tip:"U-shaped development: (1) correct from memory \u2192 (2) overregularized after rule extraction \u2192 (3) correct again after rule refinement. Stage 2 looks like regression but is the most cognitively active stage."},
{q:"According to Shaffer & Kipp, what was the key finding of Johnson and Newport\u2019s (1989) study of Korean and Chinese immigrants who had learned English as a second language?",opts:["Immigrants arriving before age 3 achieved native-like grammar; all others \u2014 regardless of arrival age \u2014 fell significantly below native-speaker level","Immigrants who had arrived in the United States between the ages of 3 and 7 performed on English grammar tasks at native-speaker level; those arriving after puberty performed substantially more poorly","There was no relationship between age of arrival and eventual English grammar proficiency after controlling for total years of residence","Only immigrants arriving before age 2 could achieve near-native grammatical proficiency, regardless of subsequent instruction"],ans:1,cat:"methods",why:"Shaffer & Kipp (p. 335, Figure 9.2) report Johnson and Newport\u2019s finding: immigrants arriving aged 3\u20137 were as proficient as native English speakers on grammar tests. Those arriving after puberty \u2014 particularly after age 15 \u2014 performed substantially more poorly.",trap:"Option A raises the cutoff to \u2018before age 3\u2019 \u2014 this is not what the study found. Arrivals aged 3\u20137 also achieved native-level proficiency. Option C is directly contradicted by Figure 9.2, which shows a clear age-of-arrival effect.",src:"Shaffer & Kipp, Ch. 9, p. 335 (The Sensitive-Period Hypothesis; Johnson & Newport, 1989; Figure 9.2)",tip:"The cutoff in Johnson & Newport is <em>puberty</em>, not age 3. Arrivals between 3\u20137 showed native-level performance. Post-puberty arrivals showed marked deficits. Know the specific age ranges cited."},
{q:"According to Woolfolk (preschool chapter), \u201cadditive bilingualism\u201d is defined as:",opts:["The gradual loss of competence in a first language while a second is acquired, associated with experiences of discrimination against use of the first language","The simultaneous and equal development of two languages when both are introduced from birth under perfectly balanced input conditions","The code-switching behaviour observed when bilingual children intentionally mix vocabulary from their two languages within a single utterance","The situation in which a speaker retains their first language fully while adding a second language to their repertoire"],ans:3,cat:"theory",why:"Woolfolk (p. 66) defines additive bilingualism as retaining the first language while adding a second. The contrast is <em>subtractive</em> bilingualism \u2014 losing L1 when acquiring L2, often associated with discrimination. The key question is: what happens to L1?",trap:"Option A defines <em>subtractive</em> bilingualism, not additive. This swap is the most common error. Option B describes a condition for <em>balanced</em> bilingualism, not a definition of additive bilingualism.",src:"Woolfolk, Preschool Ch., p. 66 (Diversity in Language Development; Norbert, 2005; Hamers & Blanc, 2000)",tip:"Additive = L1 kept + L2 added. Subtractive = L1 lost when L2 acquired. The \u2018sub-\u2019 in subtractive signals subtraction/loss of the first language."},
{q:"Roger Brown (1973), cited in Shaffer & Kipp, initially proposed that grammatical morphemes heard most frequently in parental speech would be acquired first. He ultimately rejected this hypothesis. What did he find INSTEAD?",opts:["The morphemes appearing most often in parental speech were precisely those acquired latest, so frequency predicted a reverse order","All three children varied widely in which morphemes they heard most frequently, yet all converged on the same acquisition order","Morpheme frequency in parental speech did not predict acquisition order; morphemes acquired first were semantically and syntactically simpler than those acquired later","Frequency was a reliable predictor only for the child with the largest productive vocabulary, not for the other two children"],ans:2,cat:"methods",why:"Shaffer & Kipp (p. 355) report that Brown found morpheme frequency did not predict acquisition order. His replacement explanation: morphemes acquired first were semantically and syntactically less complex than those acquired later. Complexity, not frequency, is the explanatory variable.",trap:"Option A suggests a reversed relationship \u2014 not what Brown found; he found no reliable relationship, not a reversal. Option B describes why he could not use frequency across children but does not identify the alternative explanation he adopted.",src:"Shaffer & Kipp, Ch. 9, pp. 355\u2013356 (Development of Grammatical Morphemes; Brown, 1973)",tip:"Brown\u2019s two-step finding: (1) REJECT frequency \u2014 frequency doesn\u2019t predict order. (2) ACCEPT complexity \u2014 semantic and syntactic simplicity predicts order. Always know both steps."},
{q:"A study finds that bilingual toddlers have smaller per-language vocabularies than age-matched monolinguals in each individual language. When total vocabulary is calculated across both languages combined, however, bilingual and monolingual totals are comparable. According to Woolfolk (preschool chapter), the MOST accurate interpretation is:",opts:["The combined vocabulary demonstrates equivalent conceptual knowledge \u2014 bilingual children distribute word knowledge across two language systems rather than concentrating it in one","The finding constitutes evidence of subtractive bilingualism \u2014 first-language concepts have been partially displaced by second-language acquisition","The finding shows the 25% input threshold was met for combined input but not for each language individually","Bilingualism produces a genuine and persistent lexical deficit that combined counting merely obscures"],ans:0,cat:"application",why:"Woolfolk (p. 69, citing Pearson et al., 1997) states that combined vocabulary across both languages of bilingual children is likely the same as for monolinguals. Bilingual children have concepts mapped to words in two systems \u2014 distribution, not deficit.",trap:"Option D is the erroneous inference many draw from the smaller per-language counts. Option B misapplies \u2018subtractive bilingualism\u2019 \u2014 that refers to losing L1, not to vocabulary distribution differences.",src:"Woolfolk, Preschool Ch., p. 69 (Vocabulary and Meaning; Pearson, Fernandez, Lewedeg & Oller, 1997)",tip:"Bilingual per-language vocabulary smaller \u2260 bilingual conceptual knowledge smaller. Combined vocabulary = equivalent to monolinguals. This is the standard correct answer for bilingual vocabulary questions."},
{q:"According to Shaffer & Kipp, 2-year-old Jasmine says \u201cDoggie go.\u201d Her mother responds: \u201cYes, the doggie is going away.\u201d The mother\u2019s response is BEST classified as:",opts:["A recast \u2014 she transforms the utterance into a non-repetitive grammatically correct statement with added semantic content","Negative evidence \u2014 she subtly signals that the child\u2019s utterance contained a grammatical error","An expansion \u2014 she provides a grammatically correct and enriched version of the child\u2019s ungrammatical utterance while maintaining the same communicative intent","A topic extension \u2014 she adds entirely new semantic content that goes well beyond the child\u2019s original message"],ans:2,cat:"application",why:"Shaffer & Kipp (p. 339) define an expansion as a grammatically correct and enriched version of the child\u2019s own utterance. \u2018Yes, the doggie is going away\u2019 directly enriches \u2018Doggie go\u2019 by adding article, auxiliary, and progressive form \u2014 without changing the topic.",trap:"Option A (recast) would involve a non-repetitive rephrasing \u2014 e.g., \u2018Where is that doggie going?\u2019 rather than directly building on the child\u2019s exact words. Option D (topic extension) would introduce genuinely new semantic content.",src:"Shaffer & Kipp, Ch. 9, p. 339 (Lessons from Negative Evidence; expansions defined in margin)",tip:"Expansion = enriched version of child\u2019s own sentence. Recast = non-repetitive grammatically correct alternative. Topic extension = new content added. Three distinct techniques: know all three."},
{q:"According to Shaffer & Kipp, research on parental feedback demonstrates that parents primarily influence children\u2019s grammatical development by:",opts:["Systematically reinforcing grammatically correct utterances and withholding approval for grammatically incorrect ones","Using recasts to immediately address every instance of ungrammatical speech from early infancy onward","Modelling progressively more complex syntactic structures at a level slightly above the child\u2019s current competence","Responding to the truth value (semantic accuracy) of children\u2019s utterances rather than their grammatical form \u2014 meaning direct reinforcement of correct grammar is NOT a primary mechanism"],ans:3,cat:"trap",why:"Shaffer & Kipp (p. 333) directly refute option A: parents respond to semantic truth, not grammar. The text uses the \u2018Him cow\u2019 / \u2018There\u2019s a dog!\u2019 examples to show that grammatical correctness does not drive parental approval \u2014 undermining the empiricist reinforcement account.",trap:"Trap qualifier: <em>primarily</em>. Option A is exactly what the learning perspective predicts but what the research <em>disproves</em>. Option C sounds plausible (scaffolding) but is not identified as the primary mechanism for grammar in the text.",src:"Shaffer & Kipp, Ch. 9, p. 333 (Evaluation of the Learning Perspective; Baron, 1992; Brown, Cazden & Bellugi, 1969)",tip:"This question tests knowledge of evidence <em>against</em> the learning perspective. Parents don\u2019t primarily reinforce grammar \u2014 they react to truth value. This is the key empirical refutation of Skinner\u2019s account."},
{q:"According to Woolfolk (preschool chapter), \u201cemergent literacy\u201d refers to:",opts:["The specific moment at which a child accurately decodes their first written word","The phonological awareness skills that specifically predict reading readiness in kindergarten-age children","The metalinguistic capacity to reflect consciously on written language as an arbitrary symbol system","The skills, knowledge, and attitudes that develop gradually as children learn to read and write, along with the environmental contexts and experiences that support these developments"],ans:3,cat:"theory",why:"Woolfolk (p. 71, citing Whitehurst & Lonigan, 1998) defines emergent literacy as the skills, knowledge, and attitudes developing along the way as children learn to read and write, including environmental contexts and experiences that support this. It is multi-component and gradual, not a single moment or skill.",trap:"Option A is too narrow \u2014 emergent literacy is a process, not a moment. Option B is a component of emergent literacy but not the full definition. Option C overlaps with metalinguistic awareness, a different concept.",src:"Woolfolk, Preschool Ch., p. 71 (Emergent Literacy; Whitehurst & Lonigan, 1998)",tip:"Emergent literacy is broader than phonological awareness alone. It includes skills, knowledge, attitudes, AND environmental support. Multi-component and gradual \u2014 not a milestone event."},
{q:"Research by Johnson and Newport (1989), cited in Shaffer & Kipp, showed that immigrants arriving in the United States between ages 3 and 7 performed at native-speaker level on English grammar tests. The claim that \u201cONLY immigrants arriving before age 3 can achieve native-speaker grammar proficiency\u201d is therefore:",opts:["Contradicted by the data \u2014 immigrants arriving between ages 3 and 7 also achieved native-speaker performance levels","Supported by the data \u2014 the 3\u20137 arrivals\u2019 native-level performance was due to longer cumulative years of residence, not age of acquisition","Partially supported \u2014 only arrivals between ages 3 and 5 matched native speakers; those arriving at ages 6\u20137 did not","Irrelevant, because the sensitive period applies exclusively to second-language acquisition, not to grammar proficiency assessment tasks"],ans:0,cat:"trap",why:"The word ONLY makes an absolute claim that the data directly refute: Figure 9.2 and Shaffer & Kipp\u2019s text clearly show that arrivals aged 3\u20137 (not just under 3) performed at native-speaker level. \u2018Only before age 3\u2019 is false.",trap:"Trap word: ONLY. This creates an absolute claim that the data contradict. Option B is a plausible alternative explanation but Shaffer & Kipp cite the study as supporting age-of-acquisition effects, not residence time.",src:"Shaffer & Kipp, Ch. 9, p. 335 (The Sensitive-Period Hypothesis; Johnson & Newport, 1989; Figure 9.2)",tip:"When a question contains ONLY, ALWAYS, NEVER, EXCLUSIVELY \u2014 test the extreme claim against the data. Absolutes are the most frequent EUR wording traps."},
{q:"According to Shaffer & Kipp, Russian and Turkish children produce short but reasonably grammatical sentences from the very beginning of language production \u2014 unlike English-speaking children, who go through a telegraphic period of omitting grammatical markers. The BEST explanation for this cross-linguistic difference is:",opts:["Russian and Turkish mothers provide more expansions and recasts than American mothers, teaching grammatical morphemes earlier","The sensitive period for morphological acquisition begins earlier in communities that speak heavily inflected languages","Russian and Turkish languages place heavy stress on grammatical markers and have less rigid word-order rules, making morphological features the most salient elements and therefore the first to be acquired","Telegraphic speech is a biologically programmed universal stage that is simply shorter in duration in children learning inflected languages"],ans:2,cat:"application",why:"Shaffer & Kipp (p. 351) explain that Russian and Turkish languages place heavy stress on grammatical inflections and have less rigid word order \u2014 so morphological markers are the most salient language features. Children acquire what is most salient in their specific language first.",trap:"Option D sounds biologically plausible but directly contradicts the text\u2019s explanation, which is language-structure-based, not a biological timing difference. Option A (more recasts) is not cited as the explanation.",src:"Shaffer & Kipp, Ch. 9, p. 351 (A Semantic Analysis of Telegraphic Speech; de Villiers & de Villiers, 1992; Slobin, 1985)",tip:"Children acquire what is most salient in <em>their specific language</em> first. English = word order + content words. Inflected languages = morphological markers. Cross-linguistic data challenge universal stage models."},
{q:"According to Shaffer & Kipp, overregularization errors (e.g., \u201cmouses,\u201d \u201crunned\u201d) occur on approximately what proportion of occasions when children use irregular words?",opts:["25\u201330% of occasions \u2014 roughly one in three or four uses of an irregular word","Only about 2.5\u20135% of occasions \u2014 meaning children produce the correct irregular form the vast majority of the time","Approximately 10\u201315% of occasions across all irregular morpheme types","Nearly 50% of occasions immediately after a new grammatical rule is first extracted"],ans:1,cat:"methods",why:"Shaffer & Kipp (p. 356) report that overregularization occurs on only approximately 2.5\u20135% of occasions when irregular words are used. Children produce the correct irregular form most of the time; overregularization is a relatively rare intrusion of a newly-learned rule.",trap:"Options A, C, and D all greatly overestimate overregularization frequency. The 2.5\u20135% figure is counter-intuitive (errors seem more salient to observers) but is the specific finding in the text. This is a precision question designed to catch students who reason from general impression rather than specific data.",src:"Shaffer & Kipp, Ch. 9, p. 356 (Overregularization; Maratsos, 2000; Marcus et al., 1992)",tip:"Counter-intuitive fact: overregularization is RARE (2.5\u20135%). It feels common because observers notice errors, but the irregular form is correct most of the time. This is a favourite EUR precision-data question."},
