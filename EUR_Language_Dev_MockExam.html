{q:"According to Woolfolk (middle childhood), the \u201cchunking\u201d strategy children use to organise vocabulary is BEST described as:",opts:["Grouping words first by their phonological properties and later reorganising them by syntactic role as reading ability develops","Forming large, specific subcategories early in development that are merged into broader superordinate categories as vocabulary expands","Forming equally differentiated semantic categories at all ages \u2014 only the total number of categories, not their structure, changes with development","Initially forming large, undifferentiated semantic categories (e.g., all \u201cfood\u201d) that are progressively subdivided into more specific subcategories (e.g., meats, desserts, fruits) as cognitive abilities mature"],ans:3,cat:"theory",why:"Woolfolk (pp. 206\u2013207) explains that chunking involves organising words into semantic categories. Young children form large, undifferentiated chunks. As cognitive development proceeds, these large categories are divided into progressively more specific subcategories. Direction: broad \u2192 specific.",trap:"Option B reverses the direction: children start <em>broad</em> (large, undifferentiated) and move to <em>specific</em> (subcategories), not the reverse. This reversal is the most common error on this topic.",src:"Woolfolk, Middle Childhood Ch., pp. 206\u2013207 (Organising All Those Words; Chunking)",tip:"Chunking develops from broad \u2192 specific. Young: \u2018food\u2019 (everything). Older: food \u2192 meats, desserts, fruits \u2192 chicken, beef, pork... Do not reverse this direction."},
{q:"According to Shaffer & Kipp, a 4-year-old hears \u201cThe boy was hit by the girl\u201d and incorrectly points to a picture showing a boy hitting a girl. This error MOST directly reflects:",opts:["Incomplete phonological development preventing discrimination of passive morphological markers","A tendency to interpret the first noun as the agent of the verb \u2014 applying familiar active-voice word-order rules to a passive-voice sentence","Failure of syntactical bootstrapping \u2014 the child cannot use the verb position to identify a passive construction","Insufficient metalinguistic awareness to consciously distinguish passive from active sentence structure"],ans:1,cat:"application",why:"Shaffer & Kipp (pp. 357\u2013358) explain that preschoolers misinterpret reversible passive sentences because they assume the first noun is the agent \u2014 applying their active-sentence word-order heuristic. This is a syntactic strategy error, not a phonological or metacognitive failure.",trap:"Option D sounds plausible \u2014 metalinguistic awareness IS related to grammar \u2014 but the text specifically identifies the first-noun-as-agent word-order heuristic, not metacognitive limitation, as the direct cause.",src:"Shaffer & Kipp, Ch. 9, pp. 357\u2013358 (Semantic Development; de Villiers & de Villiers, 1979)",tip:"Preschoolers use the first-noun-is-agent heuristic. Reversible passives violate this. Irreversible passives (\u2018The candy was eaten by the girl\u2019) are correctly understood because eating candy is the only sensible interpretation."},
{q:"According to Woolfolk (preschool chapter), the claim that children learning two languages simultaneously ALWAYS develop smaller combined total vocabularies than monolingual children is:",opts:["True \u2014 dual-input conditions necessarily split attention and permanently reduce total conceptual vocabulary","True \u2014 but only when one language accounts for less than 25% of total language input","False \u2014 when vocabulary knowledge is combined across both languages, bilingual children\u2019s total conceptual vocabulary is likely comparable to that of monolinguals","False \u2014 bilingual children consistently develop larger combined vocabularies because dual cultural exposure accelerates word learning"],ans:2,cat:"trap",why:"Woolfolk (p. 69) explicitly states that combined vocabulary across both languages is likely the same as for monolinguals. The trap word ALWAYS makes options A and B untenable \u2014 the combined totals are comparable, directly refuting the absolute claim.",trap:"Trap word: ALWAYS. Options A and B accept the premise (combined deficit exists) which the text refutes. Option D overcorrects by claiming larger combined vocabulary \u2014 also not supported.",src:"Woolfolk, Preschool Ch., p. 69 (Vocabulary and Meaning; Pearson et al., 1997)",tip:"Bilingual per-language vocabulary smaller. Combined conceptual vocabulary equivalent. The ALWAYS qualifier is false. Know the distinction between per-language counts and total conceptual knowledge."},
{q:"A bilingual teacher advises parents: \u201cChildren learning Dutch and Turkish simultaneously cannot become fully proficient in both \u2014 and each language must account for at least 25% of your child\u2019s language input.\u201d According to Woolfolk (preschool chapter), which part of this advice is consistent with the research?",opts:["Both claims are supported \u2014 the 25% threshold AND the impossibility of full bilingualism with simultaneous dual exposure are both correct","Neither claim is supported \u2014 the 25% threshold is inaccurate, and full bilingualism is readily achievable regardless of input ratios","The 25% threshold claim is consistent with the research; however, the claim that full bilingualism is unlikely is NOT supported \u2014 with consistent, sustained, and varied exposure, children CAN become fully bilingual in both languages","Only the claim that full bilingualism is impossible is supported; the 25% figure has no basis in the research presented"],ans:2,cat:"application",why:"Woolfolk (p. 66) states both facts: (1) Children will not develop a second language if it constitutes less than 25% of input \u2014 so the 25% threshold is supported. (2) With early, consistent, sustained exposure in a wide range of contexts, children can and do become fully bilingual \u2014 so the \u2018cannot become fully proficient\u2019 claim is directly contradicted.",trap:"Option A accepts both claims \u2014 the full-bilingualism-impossible claim is wrong. Option B rejects both \u2014 the 25% threshold is in the text. Only C correctly identifies which claim is supported and which is refuted. Two-part questions require checking each claim independently.",src:"Woolfolk, Preschool Ch., p. 66 (Dual Language Development; Hoff, 2006; Petitto & Kovelman, 2003)",tip:"Two-part questions: always verify each claim separately. Partial truths are the most dangerous distractors. Here: 25% threshold = TRUE; full bilingualism impossible = FALSE."},
{q:"According to Shaffer & Kipp, children\u2019s acquisition of negative sentences follows a stage-like progression. Which sequence MOST accurately reflects this developmental pattern?",opts:["Children first insert the negative word inside the sentence, then learn to front the negative, then acquire proper auxiliary verbs","Children first produce adult-like negative sentences, then briefly go through a telegraphic phase omitting auxiliary verbs, before returning to adult forms","Children first use auxiliary verbs correctly in negatives, then temporarily drop them, then reacquire them in adult form","Children first negate by placing a negative word at the utterance boundary (e.g., \u201cNo eat soup\u201d), then insert the negative inside the sentence (e.g., \u201cI no eat soup\u201d), then learn to combine negatives with proper auxiliary verbs (e.g., \u201cI don\u2019t want soup\u201d)"],ans:3,cat:"theory",why:"Shaffer & Kipp (pp. 356\u2013357) describe a three-stage progression: (1) External negation \u2014 place \u2018no\u2019 at utterance boundary (\u2018No eat soup\u2019); (2) Internal negation \u2014 insert \u2018no/not\u2019 inside (\u2018I no eat soup\u2019); (3) Adult-like \u2014 combine with auxiliary verbs (\u2018I don\u2019t want soup\u2019).",trap:"Options A, B, C all misrepresent the sequence. Option B is particularly misleading \u2014 children do NOT start with adult-like forms. The key progression is boundary \u2192 internal \u2192 auxiliary.",src:"Shaffer & Kipp, Ch. 9, pp. 356\u2013357 (Producing Negative Sentences; Bloom, 1970)",tip:"Three negative stages: (1) NO + sentence boundary. (2) Sentence + NO inside. (3) Proper auxiliary + NOT. Each stage more syntactically sophisticated. Boundary \u2192 Internal \u2192 Auxiliary."}
];

let cur = 0, nCorrect = 0, nWrong = 0;
const userAns = new Array(50).fill(-1);

function $(id){return document.getElementById(id);}

// Build dots
function buildDots(){
  const d = $("dots");
  for(let i=0;i<50;i++){
    const el = document.createElement("div");
    el.className = "dot" + (i===0?" active":"");
    el.title = "Q"+(i+1);
    el.addEventListener("click",()=>{ if(userAns[i]>=0) jumpTo(i); });
    d.appendChild(el);
  }
}

function getDots(){return document.querySelectorAll("#dots .dot");}

function updateDot(idx, wasCorrect){
  const dots = getDots();
  dots[idx].classList.remove("active");
  dots[idx].classList.add(wasCorrect?"ok":"bad");
  if(idx+1<50) dots[idx+1].classList.add("active");
}

function updateHeader(){
  $("pbar").style.width = (cur/50*100)+"%";
  $("cnt-correct").textContent = "\u2713 "+nCorrect;
  $("cnt-wrong").textContent   = "\u2717 "+nWrong;
  $("cnt-q").textContent       = cur+" / 50";
}

function renderQ(idx){
  const q = Qs[idx];
  const ci = CAT_INFO[q.cat];
  const html = `
<div class="qcard">
  <div class="qcard-top">
    <span class="q-num">Question ${idx+1} of 50</span>
    <span class="cat-pill ${ci.cls}">${ci.label}</span>
  </div>
  <div class="qtext">${q.q}</div>
  <div class="opts" id="opts">
    ${["A","B","C","D"].map((ltr,i)=>`
      <button class="opt" id="opt${i}" onclick="pickAns(${i})">
        <span class="opt-lbl">${ltr}.</span>
        <span>${q.opts[i]}</span>
      </button>`).join("")}
  </div>
  <div class="expanel" id="exp">
    <div class="expinner">
      <div class="verdict" id="verd"></div>
      <div class="exsec">
        <div class="exlbl">Why this answer is correct</div>
        <div class="extxt" id="ex-why"></div>
      </div>
      <div class="exsec">
        <div class="exlbl">Distractor trap</div>
        <div class="extxt" id="ex-trap"></div>
      </div>
      <div class="exsec">
        <div class="exlbl">Source</div>
        <div class="src-txt" id="ex-src"></div>
      </div>
      <div class="exsec">
        <div class="exlbl">Exam reasoning tip</div>
        <div class="tip-box" id="ex-tip"></div>
      </div>
    </div>
  </div>
</div>`;
  $("q-area").innerHTML = html;
  $("next-btn") && document.body.removeChild($("next-btn"));
  const btn = document.createElement("button");
  btn.id = "next-btn";
  btn.textContent = idx<49 ? "Next question \u2192" : "See my results";
  btn.onclick = advanceQ;
  $("main").appendChild(btn);
}

function pickAns(chosen){
  const q = Qs[cur];
  if(userAns[cur]>=0) return;
  userAns[cur] = chosen;
  const correct = chosen === q.ans;
  if(correct) nCorrect++; else nWrong++;

  // Style options
  for(let i=0;i<4;i++){
    const el = $("opt"+i);
    el.disabled = true;
    if(i===q.ans){
      el.classList.add(chosen===q.ans?"state-correct":"state-gold");
    } else if(i===chosen && chosen!==q.ans){
      el.classList.add("state-wrong");
    }
  }

  // Fill explanation
  const verd = $("verd");
  verd.textContent = correct ? "\u2713 Correct" : "\u2717 Incorrect \u2014 correct answer: "+["A","B","C","D"][q.ans];
  verd.className = "verdict "+(correct?"vc":"vw");
  $("ex-why").innerHTML  = q.why;
  $("ex-trap").innerHTML = q.trap;
  $("ex-src").innerHTML  = q.src;
  $("ex-tip").innerHTML  = q.tip;

  // Open panel
  const exp = $("exp");
  exp.classList.add("open");
  exp.scrollIntoView({behavior:"smooth", block:"nearest"});

  // Show next
  $("next-btn").style.display = "block";

  // Update header + dot
  updateDot(cur, correct);
  updateHeader();
}

function advanceQ(){
  if(cur<49){
    cur++;
    renderQ(cur);
    updateHeader();
    window.scrollTo({top:0,behavior:"smooth"});
  } else {
    showResults();
  }
}

function jumpTo(idx){
  cur = idx;
  renderQ(cur);
  if(userAns[idx]>=0) pickAns(userAns[idx]);
}

function showResults(){
  $("q-area").innerHTML = "";
  const nb = $("next-btn");
  if(nb) nb.style.display="none";
  const pct = Math.round(nCorrect/50*100);

  // Grade label
  let grade, gcolor;
  if(pct>=90){grade="A+ \u2014 Outstanding";gcolor="#c9a96e";}
  else if(pct>=80){grade="A / B \u2014 Strong pass";gcolor="#5fa876";}
  else if(pct>=70){grade="B / C \u2014 Adequate";gcolor="#8a9e60";}
  else if(pct>=60){grade="C \u2014 Marginal";gcolor="#c9a030";}
  else{grade="Insufficient \u2014 Revisit source material";gcolor="#c06060";}

  // Category breakdown
  const catTotals = {};
  const catCorrects = {};
  RESULT_CATS.forEach(rc=>{
    const joined = rc.key.join("|");
    catTotals[joined]=0; catCorrects[joined]=0;
  });
  Qs.forEach((q,i)=>{
    RESULT_CATS.forEach(rc=>{
      const joined = rc.key.join("|");
      if(rc.key.includes(q.cat)){
        catTotals[joined]++;
        if(userAns[i]===q.ans) catCorrects[joined]++;
      }
    });
  });

  // Strength / improvement
  let strongCats = [], weakCats = [];
  RESULT_CATS.forEach(rc=>{
    const joined = rc.key.join("|");
    const ratio = catTotals[joined]>0 ? catCorrects[joined]/catTotals[joined] : 0;
    if(ratio>=0.8) strongCats.push(rc.label);
    else if(ratio<0.65) weakCats.push(rc.label);
  });
  const strText = strongCats.length>0
    ? `<span class="str">Strengths:</span> You demonstrated solid command in ${strongCats.join(" and ")}.`
    : `<span class="str">Strengths:</span> Review your results carefully \u2014 no category reached 80%+ mastery.`;
  const impText = weakCats.length>0
    ? `<span class="imp">Areas to develop:</span> ${weakCats.join(" and ")} showed below-threshold accuracy. Return to source sections and distinguish key terms precisely.`
    : `<span class="imp">Areas to develop:</span> Maintain precision with wording traps \u2014 qualifier words (ONLY, ALWAYS, PRIMARILY) remain the most common source of EUR exam errors.`;

  const catBarsHTML = RESULT_CATS.map(rc=>{
    const joined = rc.key.join("|");
    const tot = catTotals[joined], cor = catCorrects[joined];
    const pctCat = tot>0 ? Math.round(cor/tot*100) : 0;
    return `<div class="bk-row">
      <span class="bk-nm">${rc.label}</span>
      <div class="bk-bar-bg"><div class="bk-bar" style="width:${pctCat}%;background:${rc.color}"></div></div>
      <span class="bk-sc">${cor}/${tot} &nbsp;${pctCat}%</span>
    </div>`;
  }).join("");

  $("results").innerHTML = `
<div class="res-hd">Examination Complete</div>
<div class="res-sub">EUR Psychology \u2022 Language Development \u2022 50 Questions</div>
<div class="score-ring">
  <div class="score-pct">${pct}%</div>
  <div class="score-lbl">Final Score</div>
</div>
<div class="res-stats">
  <div class="stat-c"><div class="stat-n g">${nCorrect}</div><div class="stat-l">Correct</div></div>
  <div class="stat-c"><div class="stat-n r">${nWrong}</div><div class="stat-l">Incorrect</div></div>
  <div class="stat-c"><div class="stat-n au">${pct}%</div><div class="stat-l">Score</div></div>
</div>
<div style="margin-bottom:20px">
  <div class="bk-title">Category Breakdown</div>
  ${catBarsHTML}
</div>
<div class="eval-box">
  <div class="eval-hd">Professional Evaluation</div>
  <div class="eval-txt">
    <strong style="color:#c9a96e">${grade}</strong><br><br>
    ${strText}<br><br>
    ${impText}
  </div>
</div>
<button class="restart" onclick="restartExam()">&#8635; Restart Exam</button>`;

  $("results").style.display = "block";
  $("pbar").style.width = "100%";
  $("cnt-q").textContent = "50 / 50";
  window.scrollTo({top:0, behavior:"smooth"});
}

function restartExam(){
  cur=0; nCorrect=0; nWrong=0;
  userAns.fill(-1);
  $("results").style.display="none";
  getDots().forEach((d,i)=>{d.className="dot"+(i===0?" active":"");});
  $("pbar").style.width="0%";
  $("cnt-correct").textContent="\u2713 0";
  $("cnt-wrong").textContent="\u2717 0";
  $("cnt-q").textContent="0 / 50";
  renderQ(0);
  window.scrollTo({top:0,behavior:"smooth"});
}

buildDots();
renderQ(0);
updateHeader();
</script>
</body>
</html>
